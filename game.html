<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcePortal - Speedrun Parkour</title>
    <style>
        body { margin:0; padding:0; display:flex; justify-content:center; align-items:center; height:100vh; background:#111; color:white; overflow:hidden; }
        canvas { border:4px solid #0f0; image-rendering:pixelated; box-shadow:0 0 30px #0f0; }
        #ui { position:absolute; top:15px; left:15px; z-index:10; background:rgba(0,0,0,0.9); padding:12px 20px; border-radius:10px; font-size:17px; }
        button { padding:8px 16px; margin:5px 3px; background:#0f0; color:black; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div>Spieler: <strong id="playerNameDisplay">---</strong></div>
        <div>Zeit: <span id="timer">0.000</span> s</div>
        <div id="status">Bereit</div>
        <button onclick="startGame()">RESTART</button>
        <button onclick="window.location.href='index.html'">← Menü</button>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let player = {x:80, y:380, width:30, height:40, vx:0, vy:0, speed:5.8, jump:-15.8, gravity:0.72, grounded:false, doubleJump:true};
        let cameraX = 0, gameTime = 0, timerInterval, isRunning = false;
        let currentPlayer = "Unbekannt";

        let platforms = [{x:0,y:420,w:220,h:80},{x:280,y:340,w:110,h:20},{x:460,y:260,w:130,h:20},{x:650,y:370,w:90,h:20},{x:820,y:220,w:140,h:20},{x:1030,y:310,w:100,h:20},{x:1220,y:180,w:110,h:20},{x:1400,y:340,w:95,h:20},{x:1580,y:250,w:120,h:20},{x:1780,y:380,w:220,h:80}];
        let goal = {x:1920, y:280, w:40, h:100};
        let hazards = [{x:0, y:480, w:2500, h:40}];
        let keys = {};

        function saveScore(name, time) {
            let scores = JSON.parse(localStorage.getItem('aceportal_scores') || '[]');
            scores.push({name: name, time: parseFloat(time)});
            scores.sort((a,b) => a.time - b.time);
            localStorage.setItem('aceportal_scores', JSON.stringify(scores.slice(0,30)));
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#111133'; ctx.fillRect(0,0,canvas.width,canvas.height);

            ctx.fillStyle = '#0a0';
            for (let p of platforms) ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);

            ctx.fillStyle = '#c00';
            for (let h of hazards) ctx.fillRect(h.x - cameraX, h.y, h.w, h.h);

            ctx.fillStyle = '#0f0';
            ctx.fillRect(goal.x - cameraX, goal.y, goal.w, goal.h);

            ctx.fillStyle = '#0ff';
            ctx.fillRect(player.x - cameraX, player.y, player.width, player.height);
        }

        function update() {
            if (!isRunning) return;

            player.vx = 0;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.vx = -player.speed;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) player.vx = player.speed;
            player.x += player.vx;

            player.vy += player.gravity;
            player.y += player.vy;
            player.grounded = false;

            for (let p of platforms) {
                if (player.x < p.x + p.w && player.x + player.width > p.x &&
                    player.y < p.y + p.h && player.y + player.height > p.y) {
                    if (player.vy > 0) {
                        player.y = p.y - player.height;
                        player.vy = 0;
                        player.grounded = true;
                        player.doubleJump = true;
                    }
                }
            }

            for (let h of hazards) {
                if (player.x < h.x + h.w && player.x + player.width > h.x &&
                    player.y < h.y + h.h && player.y + player.height > h.y) {
                    resetPlayer();
                    return;
                }
            }

            if (player.x < goal.x + goal.w && player.x + player.width > goal.x &&
                player.y < goal.y + goal.h && player.y + player.height > goal.y) {
                endRun(true);
            }

            cameraX = Math.max(0, Math.min(player.x - 200, 2000));
            if (player.y > 650) resetPlayer();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            gameTime = 0;
            document.getElementById('timer').textContent = '0.000';
            timerInterval = setInterval(() => {
                gameTime += 0.016;
                document.getElementById('timer').textContent = gameTime.toFixed(3);
            }, 16);
        }

        function startGame() {
            isRunning = true;
            document.getElementById('status').innerHTML = 'Läuft!';
            resetPlayer();
            startTimer();
        }

        function resetPlayer() {
            player.x = 80; player.y = 380; player.vx = 0; player.vy = 0; cameraX = 0;
        }

        function endRun(success) {
            isRunning = false;
            clearInterval(timerInterval);
            if (success) {
                const time = parseFloat(gameTime.toFixed(3));
                document.getElementById('status').innerHTML = `🎉 <strong>${time}s</strong>`;

                if (currentPlayer !== "Unbekannt") {
                    saveScore(currentPlayer, time);
                }
            }
        }

        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ' && isRunning) {
                e.preventDefault();
                if (player.grounded) {
                    player.vy = player.jump;
                    player.grounded = false;
                } else if (player.doubleJump) {
                    player.vy = player.jump * 0.9;
                    player.doubleJump = false;
                }
            }
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        window.onload = () => {
            currentPlayer = localStorage.getItem('aceportal_current_player') || "Unbekannt";
            document.getElementById('playerNameDisplay').textContent = currentPlayer;
            gameLoop();
        };
    </script>
</body>
</html>
