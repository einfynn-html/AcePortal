<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcePortal - Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a14;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            text-align: center;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(10,10,20,0.95);
        }
        .logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 2.5rem;
            color: #00ffcc;
        }
        .name-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid #555;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .name-btn:hover {
            background: #00ffcc;
            color: black;
            border-color: #00ffcc;
        }
        .game-area {
            margin: 40px auto;
            width: 620px;
            height: 420px;
            background: #1a1a2e;
            border: 5px solid #00ffcc;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .target {
            position: absolute;
            width: 85px;
            height: 85px;
            background: linear-gradient(45deg, #ff00cc, #00ffcc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            box-shadow: 0 0 35px #ff00cc;
            transition: all 0.08s;
            user-select: none;
        }
        .info {
            margin: 25px auto;
            font-size: 1.5rem;
        }
        button {
            margin: 12px;
            padding: 14px 38px;
            font-size: 1.25rem;
            background: #00ffcc;
            color: black;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ACEPORTAL</div>
        <button class="name-btn" onclick="setName()" id="nameBtn">Namething</button>
    </div>

    <div class="info">
        <h1>30 SEKUNDEN CLICKER</h1>
        <p>Klicke so oft wie möglich auf den leuchtenden Kreis!</p>
        <p>Zeit: <strong id="time">30</strong>s | Punkte: <strong id="score">0</strong></p>
    </div>

    <div class="game-area" id="gameArea">
        <div class="target" id="target">★</div>
    </div>

    <button onclick="startGame()">NEUES SPIEL STARTEN</button>
    <button onclick="window.location.href='index.html'">← MENÜ</button>

    <script>
        let currentPlayer = localStorage.getItem('aceportal_current_player') || "Player";

        function updateNameButton() {
            document.getElementById('nameBtn').textContent = currentPlayer;
        }

        function setName() {
            let name = prompt("Gib deinen Spielernamen ein:", currentPlayer);
            if (name && name.trim() !== "") {
                currentPlayer = name.trim();
                localStorage.setItem('aceportal_current_player', currentPlayer);
                updateNameButton();
            }
        }

        let score = 0;
        let timeLeft = 30;
        let timer;
        let gameRunning = false;
        let target = document.getElementById('target');
        let gameArea = document.getElementById('gameArea');

        function randomPosition() {
            const maxX = gameArea.clientWidth - target.clientWidth - 20;
            const maxY = gameArea.clientHeight - target.clientHeight - 20;
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;
            target.style.left = `${x}px`;
            target.style.top = `${y}px`;
        }

        function startGame() {
            if (gameRunning) return;
            if (currentPlayer === "Player") {
                alert("Bitte gib zuerst einen Namen ein!");
                return;
            }

            score = 0;
            timeLeft = 30;
            gameRunning = true;
            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;

            randomPosition();

            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(timer);
            gameRunning = false;
            target.style.left = '50%';
            target.style.top = '50%';

            if (score > 0) {
                saveScore(score);
            } else {
                alert(`Zeit vorbei!\n\nDu hast ${score} Punkte erreicht.`);
            }
        }

        function saveScore(finalScore) {
            let scores = JSON.parse(localStorage.getItem('aceportal_scores')) || [];
            
            scores.push({
                name: currentPlayer,
                score: finalScore,
                timestamp: Date.now()
            });

            const sevenDaysAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
            scores = scores
                .filter(s => s.timestamp > sevenDaysAgo)
                .sort((a, b) => b.score - a.score)
                .slice(0, 50);

            localStorage.setItem('aceportal_scores', JSON.stringify(scores));

            alert(`🎉 Spiel vorbei!\n\nSpieler: ${currentPlayer}\nScore: ${finalScore}\n\nEr wurde in der Rangliste gespeichert!`);
        }

        // Klick auf Target
        target.addEventListener('click', () => {
            if (!gameRunning) return;
            score += 10;
            document.getElementById('score').textContent = score;
            randomPosition();
        });

        // Klick neben das Target (Strafe)
        gameArea.addEventListener('click', (e) => {
            if (e.target.id !== 'target' && gameRunning) {
                score = Math.max(0, score - 5);
                document.getElementById('score').textContent = score;
            }
        });

        // Name beim Laden aktualisieren
        window.onload = updateNameButton;
    </script>
</body>
</html>
