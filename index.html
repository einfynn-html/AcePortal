<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedrun Parkour</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(#0a0a2a, #1a1a4a);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        h1 {
            font-size: 4.5rem;
            margin: 0 0 20px 0;
            text-shadow: 0 0 30px #0f0;
            letter-spacing: 4px;
        }
        .subtitle {
            font-size: 1.6rem;
            margin-bottom: 80px;
            opacity: 0.9;
        }
        button {
            padding: 20px 60px;
            font-size: 1.8rem;
            background: #00ff00;
            color: black;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin: 15px;
            font-weight: bold;
            box-shadow: 0 8px 0 #008800;
            transition: all 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #008800;
        }
        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 1.1rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>SPEEDRUN PARKOUR</h1>
    <p class="subtitle">Wie schnell bist du wirklich?</p>
    
    <button onclick="window.location.href='game.html'">🎮 SPIEL STARTEN</button>

    <div class="footer">
        Drücke <strong>LEERTASTE</strong> zum Springen • Der rote Boden ist tödlich
    </div>
</body>
</html>
