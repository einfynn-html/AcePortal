<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcePortal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a14;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
        }
        .logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 3.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #00ffcc, #ff00cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .name-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid #555;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .name-btn:hover {
            background: #00ffcc;
            color: black;
            border-color: #00ffcc;
        }
        .main {
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 80px 40px;
            flex-wrap: wrap;
        }
        .card {
            width: 320px;
            height: 380px;
            background: #1a1a2e;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 600;
            color: #aaa;
            cursor: pointer;
            transition: all 0.4s;
            border: 3px solid #2a2a4a;
        }
        .card:hover {
            transform: translateY(-20px) scale(1.05);
            border-color: #00ffcc;
            color: #00ffcc;
            box-shadow: 0 0 60px rgba(0, 255, 204, 0.3);
        }
        .game-card { color: #00ffcc; }
        .jumper-card { color: #ffff00; }
        .scoreboard-card { color: #ff00cc; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ACEPORTAL</div>
        <button class="name-btn" onclick="setName()" id="nameBtn">Namething</button>
    </div>
    <div class="main">
        <div class="card game-card" onclick="startClicker()">
            CLICKER
        </div>
        <div class="card jumper-card" onclick="startJumper()">
            JUMPER
        </div>
        <div class="card scoreboard-card" onclick="showScoreboard()">
            RANGLISTE
        </div>
    </div>

    <script>
        let currentPlayer = localStorage.getItem('aceportal_current_player') || "Player";

        function updateNameButton() {
            document.getElementById('nameBtn').textContent = currentPlayer;
        }

        function setName() {
            let name = prompt("Gib deinen Spielernamen ein:", currentPlayer);
            if (name && name.trim() !== "") {
                currentPlayer = name.trim();
                localStorage.setItem('aceportal_current_player', currentPlayer);
                updateNameButton();
            }
        }

        function startClicker() {
            if (currentPlayer === "Player") {
                alert("Bitte gib zuerst einen Namen ein!");
                return;
            }
            window.location.href = 'game.html';
        }

        function startJumper() {
            if (currentPlayer === "Player") {
                alert("Bitte gib zuerst einen Namen ein!");
                return;
            }
            window.location.href = 'jumper.html';
        }

        function showScoreboard() {
            window.location.href = 'scoreboard.html';
        }

        window.onload = updateNameButton;
    </script>
</body>
</html>
