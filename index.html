<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcePortal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #1a0033, #0a001a);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 200, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 170, 0.15) 0%, transparent 50%);
            animation: float 25s infinite linear;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(30px, 30px) rotate(5deg); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #00ffcc, #ff00cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            padding: 60px 50px;
            border-radius: 28px;
            text-align: center;
            glass: true;
        }

        h1 {
            font-size: 3.8rem;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #ffffff, #a0f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.35rem;
            color: #c0c0ff;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            padding: 18px 70px;
            font-size: 1.45rem;
            font-weight: 600;
            background: linear-gradient(45deg, #00ffcc, #00aaff);
            color: #000;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            margin: 15px 8px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.3);
        }

        .btn:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0, 255, 204, 0.5);
        }

        .leaderboard {
            margin-top: 60px;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(15px);
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 18px;
            margin: 8px 0;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            align-items: center;
        }

        .top1 { background: rgba(255, 215, 0, 0.25) !important; }
    </style>
</head>
<body>
    <div class="bg"></div>

    <header>
        <div class="logo">ACEPORTAL</div>
        <button onclick="fakeGoogleLogin()" 
                style="padding:10px 22px; background:rgba(255,255,255,0.15); border:none; border-radius:50px; color:white; cursor:pointer;">
            Mit Google anmelden
        </button>
    </header>

    <div class="container">
        <div class="card glass">
            <h1>SPEEDRUN PARKOUR</h1>
            <p class="subtitle">Überlebe die Lava. Schlage die Rekorde.</p>
            
            <a href="game.html" class="btn">JETZT SPIELEN</a>

            <!-- Leaderboard -->
            <div class="leaderboard">
                <h2 style="margin-bottom:20px; color:#a0f0ff;">🏆 Weltrangliste</h2>
                <div id="leaderboard"></div>
            </div>
        </div>
    </div>

    <script>
        function fakeGoogleLogin() {
            alert("✅ Mit Google angemeldet!\n\nDeine Highscores werden jetzt gespeichert.");
        }

        const fakeScores = [
            {pos: 1, name: "NeonDash", time: "17.84"},
            {pos: 2, name: "VoidRunner", time: "19.12"},
            {pos: 3, name: "LavaKing", time: "20.45"},
            {pos: 4, name: "PixelFox", time: "21.67"}
        ];

        function renderLeaderboard() {
            const lb = document.getElementById('leaderboard');
            lb.innerHTML = fakeScores.map(s => `
                <div class="rank-item ${s.pos === 1 ? 'top1' : ''}">
                    <span><strong>#${s.pos}</strong> ${s.name}</span>
                    <span style="color:#00ffcc; font-family:monospace;">${s.time}s</span>
                </div>
            `).join('');
        }

        window.onload = renderLeaderboard;
    </script>
</body>
</html>
