<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcePortal</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            background: radial-gradient(circle at center, #1a0033, #0a001a);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 28px;
            padding: 60px 50px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 3.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #00ffcc, #ff00cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        input {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.05rem;
        }
        button {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: #00ff88; color: black; }
        .btn-secondary { background: #555; color: white; }
    </style>
</head>
<body>
    <div class="glass">
        <div class="logo">ACEPORTAL</div>
        <p style="margin: 15px 0 40px; color:#bbb;">Speedrun Parkour</p>

        <div id="user-info" style="margin:20px 0; min-height:30px; font-weight:500;"></div>

        <input type="email" id="email" placeholder="Deine E-Mail-Adresse" />
        <input type="password" id="password" placeholder="Passwort" />

        <button onclick="signUpWithEmail()" class="btn-primary">Registrieren</button>
        <button onclick="signInWithEmail()" class="btn-secondary">Anmelden</button>

        <button onclick="signOut()" id="logout-btn" style="display:none; background:#ff4444; margin-top:20px;">
            Abmelden
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8UYsuQGkoPO6jqMgXtL0zX-iNmvA5pA0",
            authDomain: "aceportal-xyz.firebaseapp.com",   // ← ÄNDERE DAS
            projectId: "aceportal-xyz",                    // ← ÄNDERE DAS
            storageBucket: "aceportal-xyz.appspot.com",    // ← ÄNDERE DAS
            messagingSenderId: "123456789012",             // ← ÄNDERE DAS
            appId: "1:123456789012:web:xxxxxxxxxxxxxxxx"   // ← ÄNDERE DAS
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function signUpWithEmail() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) return alert("Bitte E-Mail und Passwort ausfüllen");

            auth.createUserWithEmailAndPassword(email, password)
                .then((result) => updateUI(result.user))
                .catch((error) => alert("Fehler: " + error.message));
        }

        function signInWithEmail() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, password)
                .then((result) => updateUI(result.user))
                .catch((error) => alert("Fehler: " + error.message));
        }

        function updateUI(user) {
            document.getElementById('user-info').innerHTML = `Angemeldet als <strong>${user.email}</strong>`;
            document.getElementById('logout-btn').style.display = 'block';
        }

        function signOut() {
            auth.signOut().then(() => location.reload());
        }

        auth.onAuthStateChanged(user => {
            if (user) updateUI(user);
        });
    </script>
</body>
</html>
