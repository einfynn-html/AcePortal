<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcePortal - Speedrun Parkour</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a0f;
            color: #e0e0ff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; max-width: 900px; padding: 40px 20px; }
        .logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 4.2rem;
            background: linear-gradient(90deg, #00ffcc, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline { font-size: 1.35rem; color: #a0a0ff; margin: 20px 0 50px; }
        .card {
            background: rgba(20,20,45,0.95);
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 50px;
        }
        input {
            padding: 14px 20px;
            font-size: 1.3rem;
            width: 300px;
            background: #1a1a2e;
            border: 2px solid #00ffcc;
            color: white;
            border-radius: 8px;
            margin: 20px 0;
        }
        .btn {
            padding: 16px 55px;
            font-size: 1.5rem;
            background: linear-gradient(45deg, #00ffcc, #00ccaa);
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .leaderboard {
            background: rgba(20,20,45,0.9);
            border-radius: 16px;
            padding: 25px;
            max-width: 600px;
            margin: 0 auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #00ffcc; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ACEPORTAL</div>
        <p class="tagline">SPEEDRUN PARKOUR</p>

        <div class="card">
            <input type="text" id="playerName" placeholder="Dein Spielername" maxlength="16">
            <br><br>
            <button class="btn" onclick="startGame()">🎮 SPIEL STARTEN</button>
        </div>

        <div class="leaderboard">
            <h2 style="color:#00ffcc; margin-bottom:15px;">🏆 BESTENLISTE</h2>
            <table id="lbTable">
                <thead><tr><th>#</th><th>Spieler</th><th>Zeit</th></tr></thead>
                <tbody id="lbBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function startGame() {
            let name = document.getElementById('playerName').value.trim();
            if (!name) name = "Spieler" + Math.floor(Math.random() * 9999);
            localStorage.setItem('aceportal_current_player', name);
            window.location.href = 'game.html';
        }

        function renderLeaderboard() {
            let scores = JSON.parse(localStorage.getItem('aceportal_scores') || '[]');
            const tbody = document.getElementById('lbBody');
            tbody.innerHTML = '';

            if (scores.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:#666;padding:20px;">Noch keine Einträge. Spiele und stelle Rekorde auf!</td></tr>`;
                return;
            }

            scores.sort((a,b) => a.time - b.time);
            scores.forEach((s, i) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>#${i+1}</strong></td>
                    <td>${s.name}</td>
                    <td><strong>${s.time.toFixed(3)}s</strong></td>
                `;
                tbody.appendChild(row);
            });
        }

        window.onload = renderLeaderboard;
    </script>
</body>
</html>
