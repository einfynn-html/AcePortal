<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcePortal</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            background: radial-gradient(circle at center, #1a0033, #0a001a);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 28px;
            padding: 50px 40px;
            width: 100%;
            max-width: 460px;
            text-align: center;
        }
        .logo { font-size: 3.6rem; font-weight: 800; background: linear-gradient(#00ffcc, #ff00cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
        }
        input { background: rgba(255,255,255,0.1); color: white; }
        .btn-google { background: white; color: black; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: #00ff88; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <div class="glass">
        <div class="logo">ACEPORTAL</div>
        <p style="margin: 20px 0 30px;">Speedrun Parkour</p>

        <div id="user-info" style="margin:15px 0; font-weight:500;"></div>

        <!-- Google -->
        <button onclick="signInWithGoogle()" class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="22"> 
            Mit Google anmelden
        </button>

        <div style="margin:25px 0; color:#666;">— oder —</div>

        <!-- E-Mail Registrierung / Login -->
        <input type="email" id="email" placeholder="E-Mail-Adresse" />
        <input type="password" id="password" placeholder="Passwort" />

        <button onclick="signUpWithEmail()" class="btn-primary">Registrieren</button>
        <button onclick="signInWithEmail()" class="btn-primary" style="background:#555;">Anmelden</button>

        <button onclick="signOut()" id="logout-btn" style="display:none; background:#ff4444; margin-top:20px;">
            Abmelden
        </button>
    </div>

    <script>
        const firebaseConfig = {
            // ← DEINE FIREBASE CONFIG HIER EINFÜGEN
            apiKey: "DEIN_API_KEY",
            authDomain: "dein-projekt.firebaseapp.com",
            projectId: "dein-projekt",
            storageBucket: "dein-projekt.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:xxxxxxxxxxxxxxxxxx"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(r => updateUI(r.user));
        }

        function signUpWithEmail() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (!email || !pass) return alert("Bitte E-Mail und Passwort ausfüllen");

            auth.createUserWithEmailAndPassword(email, pass)
                .then(r => updateUI(r.user))
                .catch(err => alert("Fehler: " + err.message));
        }

        function signInWithEmail() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(r => updateUI(r.user))
                .catch(err => alert("Fehler: " + err.message));
        }

        function updateUI(user) {
            document.getElementById('user-info').innerHTML = `Angemeldet als <strong>${user.email}</strong>`;
            document.getElementById('logout-btn').style.display = 'block';
        }

        function signOut() {
            auth.signOut().then(() => location.reload());
        }

        // Auto-Check
        auth.onAuthStateChanged(user => {
            if (user) updateUI(user);
        });
    </script>
</body>
</html>
