<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcePortal - Speedrun Parkour</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #e0e0ff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 900px;
            padding: 40px 20px;
        }

        .logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 4.5rem;
            background: linear-gradient(90deg, #00ffcc, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 40px rgba(0, 255, 204, 0.5);
        }

        .tagline {
            font-size: 1.4rem;
            color: #a0a0ff;
            margin-bottom: 60px;
            letter-spacing: 2px;
        }

        .game-card {
            background: rgba(20, 20, 40, 0.95);
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 40px 30px;
            margin: 0 auto;
            max-width: 520px;
            box-shadow: 0 0 60px rgba(0, 255, 204, 0.3);
            transition: transform 0.3s;
        }

        .game-card:hover {
            transform: translateY(-10px);
        }

        .game-title {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: #00ffcc;
        }

        .description {
            color: #b0b0ff;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 18px 60px;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00ffcc, #00ccaa);
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 30px rgba(0, 255, 204, 0.4);
        }

        .footer {
            margin-top: 80px;
            font-size: 0.95rem;
            color: #666;
        }

        .glow {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px #00ffcc; }
            to { text-shadow: 0 0 40px #00ffcc, 0 0 60px #ff00aa; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo glow">ACEPORTAL</div>
        <p class="tagline">FAST • COMPETITIVE • ADDICTIVE</p>

        <div class="game-card">
            <div class="game-title">SPEEDRUN PARKOUR</div>
            <p class="description">
                Teste deine Reflexe und Geschwindigkeit.<br>
                Springe über Plattformen, vermeide die tödliche Lava und stelle einen neuen Rekord auf!
            </p>
            
            <a href="game.html" class="btn">JETZT SPIELEN →</a>
        </div>

        <div class="footer">
            Bestenliste kommt bald • Rekorde werden lokal gespeichert
        </div>
    </div>
</body>
</html>
