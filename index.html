<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcePortal</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            background: radial-gradient(circle at center, #1a0033, #0a001a);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            margin: 0;
        }
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10,10,20,0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(#00ffcc, #ff00cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 28px;
            padding: 50px 40px;
            max-width: 460px;
            margin: 120px auto;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
        }
        input { background: rgba(255,255,255,0.1); color: white; }
        .btn-primary { background: #00ff88; color: black; font-weight: bold; }
        .btn-guest { background: #666; color: white; }
    </style>
</head>
<body>
    <header>
        <div class="logo">ACEPORTAL</div>
        <div id="user-header" style="font-weight:500; cursor:pointer;" onclick="showProfile()">
            Gast
        </div>
    </header>

    <div class="glass">
        <h2>Willkommen bei AcePortal</h2>
        <p style="margin:20px 0 30px; color:#bbb;">Speedrun Parkour</p>

        <input type="email" id="email" placeholder="E-Mail-Adresse" />
        <input type="password" id="password" placeholder="Passwort" />
        <input type="text" id="nickname" placeholder="Nickname (optional)" />

        <button onclick="signUpWithEmail()" class="btn-primary">Registrieren</button>
        <button onclick="signInWithEmail()" class="btn-primary" style="background:#555;">Anmelden</button>
        
        <button onclick="guestLogin()" class="btn-guest">Als Gast spielen</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8UYsuQGkoPO6jqMgXtL0zX-iNmvA5pA0",
            authDomain: "aceportal-xyz.firebaseapp.com",   // ← ANPASSEN
            projectId: "aceportal-xyz",                    // ← ANPASSEN
            storageBucket: "aceportal-xyz.appspot.com",    // ← ANPASSEN
            messagingSenderId: "123456789",                // ← ANPASSEN
            appId: "1:123456789:web:xxxxxxxxxxxxxxxx"      // ← ANPASSEN
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let currentUser = null;

        function updateHeader() {
            const header = document.getElementById('user-header');
            if (currentUser) {
                const display = currentUser.displayName || currentUser.email || "Spieler";
                header.textContent = display;
            } else {
                header.textContent = "Gast";
            }
        }

        function signUpWithEmail() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nickname = document.getElementById('nickname').value.trim();

            if (!email || !password) return alert("E-Mail und Passwort erforderlich!");

            auth.createUserWithEmailAndPassword(email, password)
                .then(result => {
                    if (nickname) {
                        result.user.updateProfile({ displayName: nickname });
                    }
                    currentUser = result.user;
                    updateHeader();
                    alert("Registrierung erfolgreich!");
                })
                .catch(err => alert("Fehler: " + err.message));
        }

        function signInWithEmail() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            auth.signInWithEmailAndPassword(email, password)
                .then(result => {
                    currentUser = result.user;
                    updateHeader();
                    alert("Erfolgreich angemeldet!");
                })
                .catch(err => alert("Fehler: " + err.message));
        }

        function guestLogin() {
            const nickname = document.getElementById('nickname').value.trim() || "Spieler";
            currentUser = { displayName: nickname + " (Guest)", isGuest: true };
            updateHeader();
            alert(`Willkommen, ${nickname} (Guest)!`);
        }

        function showProfile() {
            if (currentUser) {
                alert(`Angemeldet als: ${currentUser.displayName || currentUser.email}`);
            } else {
                alert("Du bist als Gast unterwegs.");
            }
        }

        // Auto-Login Check
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                updateHeader();
            }
        });
    </script>
</body>
</html>
