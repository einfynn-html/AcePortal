<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcePortal - Speedrun Parkour</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap');

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a0f;
            color: #e0e0ff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 900px;
            padding: 40px 20px;
        }

        .logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 4.2rem;
            background: linear-gradient(90deg, #00ffcc, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .tagline { font-size: 1.35rem; color: #a0a0ff; margin-bottom: 50px; }

        .card {
            background: rgba(20, 20, 45, 0.95);
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 60px rgba(0, 255, 204, 0.25);
        }

        input {
            padding: 14px 20px;
            font-size: 1.2rem;
            width: 280px;
            background: #1a1a2e;
            border: 2px solid #00ffcc;
            color: white;
            border-radius: 8px;
            margin: 20px 0;
        }

        .btn {
            padding: 16px 50px;
            font-size: 1.4rem;
            background: linear-gradient(45deg, #00ffcc, #00ccaa);
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
        }

        .btn:hover { transform: scale(1.05); }

        .leaderboard {
            margin-top: 50px;
            text-align: left;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .lb-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #00ffcc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #333;
        }

        th { color: #00ffcc; text-align: left; }
        tr:hover { background: rgba(0, 255, 204, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ACEPORTAL</div>
        <p class="tagline">FAST • COMPETITIVE • ADDICTIVE</p>

        <div class="card">
            <h2 style="margin-bottom:20px; color:#00ffcc;">Speedrun Parkour</h2>
            
            <input type="text" id="playerName" placeholder="Dein Name" maxlength="16">
            <br>
            <button class="btn" onclick="startGame()">🎮 SPIEL STARTEN</button>
        </div>

        <div class="leaderboard">
            <div class="lb-title">🏆 BESTENLISTE</div>
            <table id="leaderboardTable">
                <thead>
                    <tr><th>Rang</th><th>Spieler</th><th>Zeit</th></tr>
                </thead>
                <tbody id="lbBody"></tbody>
            </table>
        </div>

        <div style="margin-top:60px; color:#555; font-size:0.9rem;">
            Rekorde werden lokal gespeichert
        </div>
    </div>

    <script>
        let currentPlayer = "";

        function saveScore(name, time) {
            let scores = JSON.parse(localStorage.getItem('aceportal_scores') || '[]');
            scores.push({ name: name, time: parseFloat(time), date: new Date().toISOString() });
            scores.sort((a, b) => a.time - b.time);
            localStorage.setItem('aceportal_scores', JSON.stringify(scores.slice(0, 50))); // Top 50
            renderLeaderboard();
        }

        function renderLeaderboard() {
            const scores = JSON.parse(localStorage.getItem('aceportal_scores') || '[]');
            const tbody = document.getElementById('lbBody');
            tbody.innerHTML = '';

            scores.forEach((entry, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>#${index+1}</strong></td>
                    <td>${entry.name}</td>
                    <td><strong>${entry.time.toFixed(3)}s</strong></td>
                `;
                tbody.appendChild(row);
            });

            if (scores.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#666;">Noch keine Rekorde</td></tr>`;
            }
        }

        function startGame() {
            const nameInput = document.getElementById('playerName').value.trim();
            if (nameInput) {
                currentPlayer = nameInput;
                localStorage.setItem('aceportal_current_player', currentPlayer);
            } else {
                currentPlayer = "Player" + Math.floor(Math.random()*9999);
            }
            window.location.href = 'game.html';
        }

        // Load saved name
        window.onload = () => {
            const savedName = localStorage.getItem('aceportal_current_player');
            if (savedName) document.getElementById('playerName').value = savedName;
            renderLeaderboard();
        };
    </script>
</body>
</html>
