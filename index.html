<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcePortal - Speedrun Parkour</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e0e0ff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(10,10,20,0.95);
            border-bottom: 1px solid #00ffcc;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #00ffcc, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-name { font-weight: 500; cursor: pointer; }
        .container {
            padding-top: 100px;
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            gap: 40px;
            padding: 120px 40px 40px;
        }
        .game-section { flex: 1; }
        .leaderboard {
            width: 380px;
            background: rgba(20,20,40,0.95);
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 25px;
        }
        .rank-item {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            margin: 8px 0;
            padding: 12px 15px;
            border-radius: 10px;
        }
        .my-score { border: 2px solid #00ffcc; background: rgba(0,255,100,0.1) !important; }
        .btn {
            display: inline-block;
            padding: 18px 60px;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00ffcc, #00ccaa);
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">ACEPORTAL</div>
        <span id="user-name" class="user-name" onclick="showProfile()">Gast</span>
    </header>

    <div class="container">
        <div class="game-section">
            <h1 style="font-size:4rem; margin-bottom:10px;">SPEEDRUN PARKOUR</h1>
            <p style="font-size:1.4rem; color:#a0a0ff; margin-bottom:40px;">Wie schnell kannst du die Lava überleben?</p>
            <a href="game.html" class="btn">JETZT SPIELEN →</a>
        </div>

        <div class="leaderboard">
            <h2 style="color:#00ffcc; text-align:center; margin-bottom:20px;">🏆 Rangliste</h2>
            <div id="leaderboard"></div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:200; align-items:center; justify-content:center;">
        <div style="background:#1a1a2e; padding:40px; border-radius:20px; width:420px;">
            <h2>Anmelden / Registrieren</h2>
            
            <input type="email" id="email" placeholder="E-Mail-Adresse" style="width:100%; padding:12px; margin:10px 0; background:#222; border:none; color:white; border-radius:8px;">
            <input type="password" id="password" placeholder="Passwort" style="width:100%; padding:12px; margin:10px 0; background:#222; border:none; color:white; border-radius:8px;">
            <input type="text" id="nickname" placeholder="Nickname (optional)" style="width:100%; padding:12px; margin:10px 0; background:#222; border:none; color:white; border-radius:8px;">
            
            <button onclick="signUp()" style="width:100%; padding:14px; background:#00ff88; color:black; border:none; border-radius:8px; margin:15px 0;">Registrieren</button>
            <button onclick="signIn()" style="width:100%; padding:14px; background:#555; color:white; border:none; border-radius:8px;">Anmelden</button>
            <button onclick="guestLogin()" style="width:100%; padding:14px; background:#666; color:white; border:none; border-radius:8px; margin-top:10px;">Als Gast spielen</button>
            
            <button onclick="closeModal()" style="margin-top:15px; color:#aaa;">Schließen</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let myBestTime = localStorage.getItem('speedrunBest') ? parseFloat(localStorage.getItem('speedrunBest')) : null;

        function showLoginModal() {
            document.getElementById('loginModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('loginModal').style.display = 'none';
        }

        function signUp() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const nick = document.getElementById('nickname').value.trim() || email.split('@')[0];

            alert("Registrierung mit E-Mail ist derzeit simuliert.\n\nAngemeldet als: " + nick);
            currentUser = { name: nick, email: email };
            document.getElementById('user-name').textContent = nick;
            closeModal();
            updateLeaderboard();
        }

        function signIn() {
            const email = document.getElementById('email').value;
            const nick = document.getElementById('nickname').value.trim() || email.split('@')[0];

            alert("Anmeldung simuliert.\n\nAngemeldet als: " + nick);
            currentUser = { name: nick, email: email };
            document.getElementById('user-name').textContent = nick;
            closeModal();
            updateLeaderboard();
        }

        function guestLogin() {
            const nick = document.getElementById('nickname').value.trim() || "Spieler";
            currentUser = { name: nick, isGuest: true };
            document.getElementById('user-name').textContent = nick + " (Guest)";
            closeModal();
            updateLeaderboard();
        }

        function showProfile() {
            if (currentUser) {
                alert(`Angemeldet als: ${currentUser.name}`);
            } else {
                showLoginModal();
            }
        }

        function updateLeaderboard() {
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';

            if (myBestTime) {
                const div = document.createElement('div');
                div.className = 'rank-item my-score';
                div.innerHTML = `
                    <div class="rank-pos">★</div>
                    <div class="rank-name">${currentUser ? currentUser.name : 'Du'} ${currentUser && currentUser.isGuest ? '(Guest)' : ''}</div>
                    <div class="rank-time">${myBestTime.toFixed(2)}s</div>
                `;
                container.appendChild(div);
            } else {
                container.innerHTML = `<p style="text-align:center; color:#666; padding:40px 20px;">Spiele zuerst, um deine Zeit hier zu sehen!</p>`;
            }
        }

        window.onload = updateLeaderboard;
    </script>
</body>
</html>
